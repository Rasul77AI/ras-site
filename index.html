<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rasul Site</title>

<style>
body{
    margin:0;
    font-family:Arial;
    color:white;
    background: linear-gradient(-45deg,#0f172a,#1e293b,#0b1220,#111827);
    background-size: 400% 400%;
    animation: bg 10s ease infinite;
}

@keyframes bg{
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
}

#modeSelect{
    position:fixed;
    inset:0;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

button{
    padding:12px 20px;
    margin:10px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

section{
    padding:40px;
    max-width:800px;
    margin:auto;
}

.card{
    background:rgba(255,255,255,0.05);
    padding:15px;
    margin:10px 0;
    border-radius:10px;
}

input,textarea{
    width:100%;
    padding:10px;
    margin:5px 0;
    border-radius:8px;
    border:none;
}

#userSite, #adminPanel{
    display:none;
}
</style>
</head>

<body>

<div id="modeSelect">
<h2>Выбери режим</h2>
<button onclick="userMode()">Пользователь</button>
<button onclick="adminMode()">Админ</button>
</div>

<div id="userSite">

<section>
<h1>Rasul Studio</h1>
<p>Сайты и разработка</p>
</section>

<section>
<h2>Обо мне</h2>
<div class="card">Я начинающий разработчик сайтов.</div>
</section>

<section>
<h2>Услуги</h2>
<div class="card">Лендинг сайт</div>
<div class="card">Бизнес сайт</div>
<div class="card">Дизайн</div>
</section>

<section>
<h2>Заказать</h2>
<input id="name" placeholder="Имя">
<input id="tg" placeholder="Telegram">
<textarea id="text" placeholder="Что нужно?"></textarea>
<button onclick="send()">Отправить</button>
</section>

</div>

<div id="adminPanel">

<h2>Админ панель</h2>
<button onclick="back()">Выход</button>

<div id="leads"></div>

</div>

<script>

let leads = [];

function userMode(){
    document.getElementById("modeSelect").style.display="none";
    document.getElementById("userSite").style.display="block";
}

function adminMode(){
    let pass = prompt("Пароль:");
    if(pass === "1234"){
        document.getElementById("modeSelect").style.display="none";
        document.getElementById("adminPanel").style.display="block";
        loadLeads();
    } else {
        alert("Неверный пароль");
    }
}

function back(){
    location.reload();
}

function send(){
    let name = document.getElementById("name").value;
    let tg = document.getElementById("tg").value;
    let text = document.getElementById("text").value;

    if(!name  !tg  !text){
        alert("Заполните все поля");
        return;
    }

    leads.push({name,tg,text});

    alert("Заявка отправлена");
}

function loadLeads(){
    let box = document.getElementById("leads");
    box.innerHTML = "";

    leads.forEach(l=>{
        box.innerHTML += `
        <div class="card">
            ${l.name}<br>
            ${l.tg}<br>
            ${l.text}
        </div>`;
    });
}

</script>

</body>
</html>
