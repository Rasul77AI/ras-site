<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rasul Studio SaaS</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#050814;
    color:white;
}

/* LOGIN */
#login {
    position:fixed;
    inset:0;
    background:#050814;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

input, textarea {
    padding:10px;
    margin:5px;
    border-radius:8px;
    border:none;
}

button {
    padding:10px 15px;
    background:#22c55e;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

/* MAIN */
header {
    display:flex;
    justify-content:space-between;
    padding:15px;
    background:#0b1220;
    position:sticky;
    top:0;
}

section {
    padding:60px 20px;
    max-width:900px;
    margin:auto;
}

.card {
    background:rgba(255,255,255,0.05);
    padding:15px;
    border-radius:10px;
    margin:10px 0;
}

/* CHAT */
#chatBox {
    position:fixed;
    right:20px;
    bottom:20px;
    width:250px;
    background:#0b1220;
    padding:10px;
    border-radius:10px;
}

#messages {
    height:150px;
    overflow:auto;
    font-size:12px;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
    <h2>Admin Login</h2>
    <input id="u" placeholder="login">
    <input id="p" type="password" placeholder="password">
    <button onclick="login()">Enter</button>
</div>

<!-- MAIN -->
<div id="app" style="display:none">

<header>
    <h3>⚡ Rasul SaaS</h3>
    <button onclick="logout()">Exit</button>
</header>

<section>
    <h2>📊 Заявки (CRM)</h2>
    <div id="leads"></div>
</section>

<section>
    <h2>💰 Заказы</h2>
    <div class="card">Landing — 5000₸</div>
    <div class="card">Business — 10000₸</div>
</section>

<!-- CHAT -->
<div id="chatBox">
    <div id="messages"></div>
    <input id="msg" placeholder="Напиши...">
</div>

</div>

<script>

/* =========================
   LOGIN (demo)
========================= */
function login(){
    const u = document.getElementById("u").value;
    const p = document.getElementById("p").value;

    if(u==="admin" && p==="1234"){
        document.getElementById("login").style.display="none";
        document.getElementById("app").style.display="block";
        loadLeads();
    } else {
        alert("wrong");
    }
}

function logout(){
    location.reload();
}

/* Пока имитация базы */
let leads = [
    {name:"Ali", tg:"@ali", text:"Сайт"},
    {name:"Dias", tg:"@dias", text:"Лендинг"}
];

function loadLeads(){
    const box = document.getElementById("leads");
    box.innerHTML = "";

    leads.forEach(l=>{
        box.innerHTML += `
        <div class="card">
            👤 ${l.name}<br>
            📱 ${l.tg}<br>
            📝 ${l.text}
        </div>`;
    });
}

/* =========================
   SIMPLE AI CHAT
========================= */

document.getElementById("msg").addEventListener("keypress", function(e){
    if(e.key==="Enter"){
        const val = this.value;
        const box = document.getElementById("messages");

        box.innerHTML += "<div>👤 "+val+"</div>";

        let reply = "Я не понял";

        if(val.includes("цена")){
            reply = "От 5000₸";
        } else if(val.includes("сайт")){
            reply = "Я делаю лендинги и бизнес сайты";
        } else {
            reply = "Напиши заявку в CRM";
        }

        setTimeout(()=>{
            box.innerHTML += "<div>🤖 "+reply+"</div>";
        },500);

        this.value="";
    }
});
