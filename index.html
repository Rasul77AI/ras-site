<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rasul Studio</title>

<style>
body {
    margin:0;
    font-family:Arial;
    color:white;

    background: linear-gradient(-45deg, #0f172a, #1e293b, #0b1220, #111827);
    background-size: 400% 400%;
    animation: bgMove 12s ease infinite;
}

@keyframes bgMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* MODE SELECT */
#modeSelect {
    position:fixed;
    inset:0;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background:#050814;
}

button {
    padding:12px 20px;
    margin:10px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
}

/* USER SITE */
header {
    display:flex;
    justify-content:space-between;
    padding:15px;
    background:#0b1220;
}

section {
    padding:60px 20px;
    max-width:900px;
    margin:auto;
}

.card {
    background:rgba(255,255,255,0.05);
    padding:15px;
    margin:10px 0;
    border-radius:10px;
}

/* FORM */
input, textarea {
    width:100%;
    padding:10px;
    margin:5px 0;
    border-radius:8px;
    border:none;
}

.btn {
    background:#22c55e;
}

/* ADMIN */
#adminPanel {
    display:none;
    padding:20px;
}

.lead {
    background:rgba(255,255,255,0.05);
    padding:10px;
    margin:10px 0;
    border-radius:10px;
}

</style>
</head>
